name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate keystore for signing
        run: |
          keytool -genkeypair \
            -keystore ${{ runner.temp }}/release.jks \
            -alias teacherjournal \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=TeacherJournal, OU=Dev, O=TeacherJournal, L=Beijing, ST=Beijing, C=CN" \
            -noprompt

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: teacherjournal
          KEY_PASSWORD: android
        run: ./gradlew assembleRelease

      - name: Generate MD5 and rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          MD5_HASH=$(md5sum "$APK_PATH" | awk '{print $1}')
          APK_NAME="TeacherJournal-${MD5_HASH}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "MD5_HASH=$MD5_HASH" >> $GITHUB_ENV
          echo "APK generated: $APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeacherJournal-${{ env.MD5_HASH }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Upload APK to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APK_NAME }}
